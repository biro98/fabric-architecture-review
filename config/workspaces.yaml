# Workspaces in scope for this engagement.
# Either list explicit workspace IDs, or set `all_workspaces: true` to let
# the Scanner API enumerate every workspace the SP can see.
#
# DATA SAFETY: This file controls *scope* only. Collectors never read
# data inside these workspaces — only metadata, configuration, and metrics.

all_workspaces: false

workspaces:
  - id: 00000000-0000-0000-0000-000000000000
    name: example-workspace-bronze
    notes: "Bronze landing zone"
  # - id: 11111111-1111-1111-1111-111111111111
  #   name: example-workspace-silver

# Optional: capacities in scope. If empty, derived from workspaces above.
capacities: []
